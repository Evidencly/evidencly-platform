version: '3.8'

services:

  postgres:
    image: postgres:14
    container_name: evidencly-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-evidencly}
      POSTGRES_USER: ${POSTGRES_USER:-evidencly_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-evidencly_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: evidencly-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-evidencly_user}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-evidencly}
      ETHERSCAN_API_KEY: ${ETHERSCAN_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      BRAVE_API_KEY: ${BRAVE_API_KEY}
      TWITTER_BEARER_TOKEN: ${TWITTER_BEARER_TOKEN}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      PORT: 8004
    ports:
      - "8004:8004"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8004/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: evidencly-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"

volumes:
  postgres_data:
